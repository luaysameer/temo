<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMO — فك التشفير</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F37623;--orange-l:#FF9A45;--orange-pale:#FFF4EC;
  --blue-d:#1A3A6B;--blue-m:#2563B0;--blue-l:#4A90D9;--blue-pale:#EDF3FB;
  --gray:#7A8EA8;--bg:#F0F5FB;--card:#FFFFFF;
}
body{
  font-family:"Tajawal",sans-serif;background:var(--bg);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 16px;position:relative;overflow-x:hidden;
}
body::before{content:"";position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(243,118,35,.18) 0%,transparent 70%);
  top:-180px;right:-180px;pointer-events:none;z-index:0;}
body::after{content:"";position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,176,.15) 0%,transparent 70%);
  bottom:-180px;left:-180px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;}
.logo-block{
  background:linear-gradient(160deg,#fff 60%,var(--orange-pale) 100%);
  border-radius:28px 28px 0 0;width:100%;padding:40px 24px 32px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  border:1.5px solid rgba(243,118,35,.12);border-bottom:none;
}
.logo-block::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--orange),var(--orange-l) 40%,var(--blue-l) 75%,var(--blue-m));}
.logo-block::after{content:"";position:absolute;width:320px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(243,118,35,.10) 0%,transparent 70%);
  top:20px;left:50%;transform:translateX(-50%);pointer-events:none;}
.logo-img{
  width:290px;max-width:82vw;position:relative;z-index:1;
  animation:float 3.8s ease-in-out infinite;
  filter:drop-shadow(0 8px 22px rgba(243,118,35,.28));
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.card{
  background:var(--card);border-radius:0 0 28px 28px;
  padding:30px 28px 34px;width:100%;
  border:1.5px solid rgba(37,99,176,.10);border-top:none;
  box-shadow:0 16px 56px rgba(26,58,107,.12),0 2px 8px rgba(243,118,35,.06);
}
.label{text-align:center;margin-bottom:22px;line-height:1.8;}
.label-main{display:block;font-size:17px;font-weight:900;color:var(--blue-d);margin-bottom:4px;}
.label-sub{display:block;font-size:13px;font-weight:700;color:var(--gray);}
.code-input{
  width:100%;padding:20px 22px;
  border:2px solid rgba(74,144,217,.25);border-radius:16px;
  font-family:"Tajawal",sans-serif;font-size:30px;font-weight:900;
  letter-spacing:7px;color:var(--blue-d);background:var(--blue-pale);
  outline:none;text-align:center;direction:ltr;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.code-input::placeholder{color:#B8C8DC;letter-spacing:3px;font-size:20px;font-weight:400;}
.code-input:focus{border-color:var(--blue-m);box-shadow:0 0 0 4px rgba(37,99,176,.10);background:#fff;}
.code-input.shake{animation:shake .4s ease;border-color:#E53935;background:rgba(229,57,53,.05);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--orange) 0%,var(--orange-l) 40%,var(--blue-l) 75%,var(--blue-m) 100%);
  background-size:200% 200%;background-position:0% 50%;
  color:#fff;font-family:"Tajawal",sans-serif;font-size:20px;font-weight:900;
  cursor:pointer;box-shadow:0 5px 24px rgba(243,118,35,.40);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background-position .4s,transform .15s,box-shadow .2s;
}
.btn:hover{background-position:100% 50%;transform:translateY(-2px);box-shadow:0 8px 32px rgba(243,118,35,.50);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.65;cursor:not-allowed;transform:none;}
.err-box{
  display:none;margin-top:14px;
  background:rgba(229,57,53,.06);border:1.5px solid rgba(229,57,53,.22);
  border-radius:12px;padding:13px 16px;
  font-size:14px;font-weight:700;color:#B71C1C;
  align-items:center;gap:10px;animation:fadeUp .3s ease;
}
.err-box.show{display:flex;}
.countdown-box{
  display:none;margin-top:22px;
  background:linear-gradient(135deg,var(--blue-pale),var(--orange-pale));
  border:2px solid rgba(243,118,35,.18);border-radius:20px;
  padding:26px 20px 22px;text-align:center;animation:fadeUp .4s ease;
}
.countdown-box.show{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cd-label{font-size:14px;font-weight:700;color:var(--gray);margin-bottom:12px;letter-spacing:.3px;}
.cd-num{
  font-size:72px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--orange),var(--blue-m));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:pulse 1s ease-in-out infinite;display:inline-block;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.10)}}
.prog-track{margin-top:16px;height:7px;background:rgba(37,99,176,.12);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--orange),var(--orange-l) 50%,var(--blue-m));border-radius:99px;transition:width 1s linear;}
@media(max-width:400px){
  .logo-img{width:210px;}.code-input{font-size:24px;letter-spacing:5px;}
  .card{padding:22px 16px 26px;}.cd-num{font-size:56px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-block">
    <img class="logo-img" src="https://raw.githubusercontent.com/luaysameer/temo/main/temo-logo.png" alt="TEMO">
  </div>
  <div class="card">
    <div class="label">
      <span class="label-main">أدخل رقم التشفير لتحميل الروابط المصغّرة</span>
      <span class="label-sub">Enter the decode number to access the link</span>
    </div>
    <input class="code-input" id="codeInput" type="text" placeholder="0000000"
      maxlength="20" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn" id="decodeBtn" onclick="decode()">
      🔓&nbsp; Decode &nbsp;·&nbsp; فك التشفير
    </button>
    <div class="err-box" id="errBox"><span>⚠️</span><span id="errText"></span></div>
    <div class="countdown-box" id="cdBox">
      <div class="cd-label">Redirecting in &nbsp;·&nbsp; سيتم التحويل خلال</div>
      <div class="cd-num" id="cdNum">5</div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
</div>
<script>
var _t=null;
function err(msg){var b=document.getElementById("errBox");b.classList.add("show");document.getElementById("errText").textContent=msg;}
function clearErr(){document.getElementById("errBox").classList.remove("show");}
function shake(){var i=document.getElementById("codeInput");i.classList.add("shake");setTimeout(function(){i.classList.remove("shake");},500);}
function decode(){
  clearErr();
  var raw=document.getElementById("codeInput").value.trim();
  if(!raw){shake();err("الرجاء إدخال رقم التشفير  /  Please enter the code");return;}
  if(!/^\d+$/.test(raw)){shake();err("أرقام فقط  /  Numbers only");return;}
  document.getElementById("codeInput").disabled=true;
  document.getElementById("decodeBtn").disabled=true;
  var target="https://aftv.news/"+raw;
  var box=document.getElementById("cdBox");
  var numEl=document.getElementById("cdNum");
  var fill=document.getElementById("progFill");
  box.classList.add("show");
  var c=5;numEl.textContent=c;fill.style.width="100%";
  _t=setInterval(function(){
    c--;numEl.textContent=c;fill.style.width=(c/5*100)+"%";
    if(c<=0){
      clearInterval(_t);numEl.textContent="🚀";
      var a=document.createElement("a");a.href=target;a.target="_blank";a.rel="noopener noreferrer";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(reset,2200);
    }
  },1000);
}
function reset(){
  clearInterval(_t);
  document.getElementById("codeInput").disabled=false;
  document.getElementById("codeInput").value="";
  document.getElementById("decodeBtn").disabled=false;
  document.getElementById("cdBox").classList.remove("show");
  document.getElementById("cdNum").textContent="5";
  document.getElementById("progFill").style.width="100%";
}
document.getElementById("codeInput").addEventListener("keydown",function(e){if(e.key==="Enter")decode();});
document.getElementById("codeInput").addEventListener("input",clearErr);
</script>
</body>
</html>
